- name: Check if Kubernetes cluster already initialized
  stat:
    path: /etc/kubernetes/admin.conf
  register: kubectl_exists
  tags: init

- name: Initialize Kubernetes Cluster
  command: >
    kubeadm init 
    --pod-network-cidr={{ pod_network_cidr }} 
    --apiserver-advertise-address={{ ansible_facts['default_ipv4']['address'] }}
    --cri-socket=unix:///run/containerd/containerd.sock
  when: not kubectl_exists.stat.exists
  register: kubeadm_init
  tags: init

- name: Display kubeadm init output
  debug:
    var: kubeadm_init.stdout_lines
  when: kubeadm_init is changed
  tags: init

- name: Create .kube directory for ubuntu user
  file:
    path: /home/ubuntu/.kube
    state: directory
    owner: ubuntu
    group: ubuntu
    mode: "0755"
  tags: config

- name: Copy admin.conf to ubuntu user's kube config
  copy:
    src: /etc/kubernetes/admin.conf
    dest: /home/ubuntu/.kube/config
    owner: ubuntu
    group: ubuntu
    mode: "0644"
    remote_src: yes
  tags: config

- name: Wait for API server to be ready
  wait_for:
    host: "{{ ansible_facts['default_ipv4']['address'] }}"
    port: 6443
    delay: 10
    timeout: 300
  tags: init

- name: Wait for all control-plane pods to be created
  shell: kubectl get pods -n kube-system --no-headers | wc -l
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  register: control_plane_pods
  until: control_plane_pods.stdout|int >= 4
  delay: 10
  retries: 20
  changed_when: false
  tags: init

- name: Display control plane pods
  command: kubectl get pods -n kube-system
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  register: pods_status
  changed_when: false
  tags: init

- name: Show control plane pods
  debug:
    var: pods_status.stdout_lines
  tags: init

- name: Install Calico network plugin
  become: no
  command: >
    kubectl apply -f https://raw.githubusercontent.com/projectcalico/calico/v3.26.1/manifests/calico.yaml
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
  register: calico_install
  changed_when: "'created' in calico_install.stdout or 'configured' in calico_install.stdout"
  tags: cni

- name: Display Calico install output
  debug:
    var: calico_install.stdout_lines
  tags: cni

- name: Wait for Calico daemonset to exist
  become: no
  command: kubectl get daemonset -n kube-system calico-node
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
  register: calico_ds_check
  until: calico_ds_check.rc == 0
  delay: 5
  retries: 12
  changed_when: false
  tags: cni

- name: Check if kube-proxy exists
  become: no
  command: kubectl get daemonset -n kube-system kube-proxy
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
  register: kube_proxy_check
  ignore_errors: yes
  changed_when: false
  tags: cni

- name: Display kube-proxy check result
  debug:
    msg: "kube-proxy {{ 'exists' if kube_proxy_check.rc == 0 else 'not found - will install' }}"
  tags: cni

- name: Copy kube-proxy manifest to master
  template:
    src: kube-proxy.yaml.j2
    dest: /tmp/kube-proxy.yaml
    mode: "0644"
  when: kube_proxy_check.rc != 0
  tags: cni

- name: Install kube-proxy
  become: no
  command: kubectl apply -f /tmp/kube-proxy.yaml
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
  when: kube_proxy_check.rc != 0
  register: kube_proxy_install
  tags: cni

- name: Display kube-proxy install output
  debug:
    var: kube_proxy_install.stdout_lines
  when: kube_proxy_check.rc != 0 and kube_proxy_install is defined
  tags: cni

- name: Remove kube-proxy manifest
  file:
    path: /tmp/kube-proxy.yaml
    state: absent
  tags: cni

- name: Wait for kube-proxy daemonset to be created
  become: no
  command: kubectl get daemonset -n kube-system kube-proxy
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
  register: kube_proxy_ds
  until: kube_proxy_ds.rc == 0
  delay: 5
  retries: 12
  changed_when: false
  tags: cni

- name: Wait for kube-proxy pods to be ready
  become: no
  shell: kubectl get pods -n kube-system -l k8s-app=kube-proxy --no-headers | grep -c "Running" || echo "0"
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
  register: kube_proxy_ready
  until: kube_proxy_ready.stdout|int >= 1
  delay: 10
  retries: 20
  changed_when: false
  tags: cni

- name: Get kube-proxy status
  become: no
  command: kubectl get pods -n kube-system -l k8s-app=kube-proxy -o wide
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
  register: kube_proxy_status
  changed_when: false
  tags: cni

- name: Display kube-proxy pods
  debug:
    var: kube_proxy_status.stdout_lines
  tags: cni

- name: Wait for Calico pods to be ready
  become: no
  shell: kubectl get pods -n kube-system -l k8s-app=calico-node --no-headers | grep -c "Running" || echo "0"
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
  register: calico_pods_running
  until: calico_pods_running.stdout|int >= 1
  delay: 10
  retries: 20
  changed_when: false
  tags: cni

- name: Get Calico pods status
  become: no
  command: kubectl get pods -n kube-system -l k8s-app=calico-node -o wide
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
  register: calico_pods_status
  changed_when: false
  tags: cni

- name: Display Calico pods
  debug:
    var: calico_pods_status.stdout_lines
  tags: cni

- name: Wait for API server to be fully ready
  command: kubectl get nodes
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
  register: nodes_check
  until: nodes_check.rc == 0
  delay: 5
  retries: 30
  changed_when: false
  tags: join

- name: Generate join command with retries
  shell: kubeadm token create --print-join-command
  register: join_command
  until: join_command.rc == 0
  delay: 10
  retries: 10
  tags: join

- name: Display join command
  debug:
    var: join_command.stdout_lines
  tags: join

- name: Save join command to local file
  copy:
    content: "{{ join_command.stdout }}"
    dest: "{{ playbook_dir }}/join-command.sh"
    mode: "0644"
  delegate_to: localhost
  become: no
  tags: join

- name: Display cluster nodes status
  become: no
  command: kubectl get nodes -o wide
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
  register: nodes
  changed_when: false
  tags: verify

- name: Show cluster nodes
  debug:
    var: nodes.stdout_lines
  tags: verify

- name: Display all pods in kube-system
  become: no
  command: kubectl get pods -n kube-system -o wide
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
  register: all_pods
  changed_when: false
  tags: verify

- name: Show all kube-system pods
  debug:
    var: all_pods.stdout_lines
  tags: verify
