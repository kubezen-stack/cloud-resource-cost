- name: "Check if Kubernetes is already installed"
  stat:
    path: /etc/kubernetes/admin.conf
  register: kubectl_exists
  ignore_errors: true
  tags: init

- name: Initialize Kubernetes Cluster
  command: >
    kubeadm init 
    --pod-network-cidr={{ pod_network_cidr }} 
    --api-server-advertise-address={{ ansible_default_ipv4.address }}
    --cri-socket=unix:///run/containerd/containerd.sock
  when: not kubectl_exists.stat.exists
  register: kubeadm_init
  tags: init

- name: Create .kube directory for user ubuntu
  file:
    path: /home/ubuntu/.kube
    state: directory
    owner: ubuntu
    group: ubuntu
    mode: 0755
  tags: config

- name: Copy kubeconfig file to user ubuntu
  copy:
    src: /etc/kubernetes/admin.conf
    dest: /home/ubuntu/.kube/config
    owner: ubuntu
    group: ubuntu
    mode: 0644
    remote_src: true
  tags: config

- name: Install Calico network plugin
  command: >
    kubectl apply -f https://raw.githubusercontent.com/projectcalico/calico/v3.26.1/manifests/calico.yaml
  environment:
    - KUBECONFIG=/home/ubuntu/.kube/config
  register: calico
  changed_when: "'created' in calico.stdout_lines or 'updated' in calico.stdout_lines"
  tags: cni

- name: Wait for Calico to be ready
  become: no
  command: >
    kubectl get pods -n kube-system -l k8s-app=calico-node --no-headers || grep -c "Running" || true
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
  register: calico_ready
  until: calico_ready.stdout|int > 0
  delay: 10
  retries: 20
  when: network_plugin == 'calico'
  tags: cni

- name: Get token to join worker nodes
  command: kubeadm token create --print-join-command
  register: join_command
  tags: join

- name: Copy join command to local file
  become: no
  local_action:
    module: copy
    content: "{{ join_command.stdout }}"
    dest: "{{ playbook_dir }}/join-command.sh"
  tags: join

- name: Show cluster is initialized
  debug:
    msg: "Cluster is initialized"
  when: kubeadm_init.changed
  tags: init

- name: Display cluster nodes status
  become: no
  command: kubectl get nodes
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
  register: nodes
  tags: verify

- name: Show cluster nodes
  debug:
    msg: "{{ nodes.stdout_lines }}"
  tags: verify
