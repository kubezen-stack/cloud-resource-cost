- name: Install AWS CLI dependencies
  apt:
    name:
      - unzip
      - curl
    state: present
  tags: install

- name: Download AWS CLI
  get_url:
    url: "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip"
    dest: "/tmp/awscliv2.zip"
    mode: "0644"
  tags: install

- name: Unzip AWS CLI
  unarchive:
    src: /tmp/awscliv2.zip
    dest: /tmp
    remote_src: yes
  tags: install

- name: Install AWS CLI
  shell: /tmp/aws/install --update
  tags: install

- name: Verify AWS CLI
  command: aws --version
  changed_when: false
  tags: install

- name: Install Terraform dependencies
  apt:
    name:
      - gnupg
      - software-properties-common
    state: present
  tags: terraform

- name: Add HashiCorp GPG key
  apt_key:
    url: https://apt.releases.hashicorp.com/gpg
    state: present
  tags: terraform

- name: Add HashiCorp repository
  apt_repository:
    repo: "deb [arch=amd64] https://apt.releases.hashicorp.com {{ ansible_distribution_release }} main"
    state: present
    update_cache: yes
  tags: terraform

- name: Install Terraform
  apt:
    name: "terraform=1.6.0-*"
    state: present
  tags: terraform

- name: Verify Terraform
  command: terraform version
  changed_when: false
  tags: terraform

- name: Check if runner is already configured
  stat:
    path: /home/ubuntu/actions-runner/.runner
  register: runner_configured
  tags: install

- name: Create runner directory
  file:
    path: /home/ubuntu/actions-runner
    state: directory
    owner: ubuntu
    group: ubuntu
    mode: "0755"
  tags: install

- name: Download GitHub Actions runner
  get_url:
    url: "https://github.com/actions/runner/releases/download/v{{ runner_version }}/actions-runner-linux-x64-{{ runner_version }}.tar.gz"
    dest: "/tmp/actions-runner.tar.gz"
    mode: "0644"
  when: not runner_configured.stat.exists
  tags: install

- name: Extract runner archive
  unarchive:
    src: /tmp/actions-runner.tar.gz
    dest: /home/ubuntu/actions-runner
    remote_src: yes
    owner: ubuntu
    group: ubuntu
  when: not runner_configured.stat.exists
  tags: install

- name: Get runner registration token from GitHub API
  uri:
    url: "https://api.github.com/repos/{{ github_org }}/{{ github_repo }}/actions/runners/registration-token"
    method: POST
    headers:
      Authorization: "Bearer {{ github_pat }}"
      Accept: "application/vnd.github+json"
      X-GitHub-Api-Version: "2022-11-28"
    status_code: 201
  register: runner_token_response
  when: not runner_configured.stat.exists
  tags: install

- name: Configure runner
  become: no
  shell: |
    ./config.sh \
      --url https://github.com/{{ github_org }}/{{ github_repo }} \
      --token {{ runner_token_response.json.token }} \
      --name {{ runner_name }} \
      --labels self-hosted,linux,x64,{{ environment }} \
      --work _work \
      --unattended
  args:
    chdir: /home/ubuntu/actions-runner
  when: not runner_configured.stat.exists
  tags: install

- name: Install runner as systemd service
  shell: ./svc.sh install ubuntu
  args:
    chdir: /home/ubuntu/actions-runner
  when: not runner_configured.stat.exists
  tags: install

- name: Start runner service
  shell: ./svc.sh start
  args:
    chdir: /home/ubuntu/actions-runner
  when: not runner_configured.stat.exists
  tags: install

- name: Verify runner is active
  shell: ./svc.sh status
  args:
    chdir: /home/ubuntu/actions-runner
  register: runner_status
  changed_when: false
  tags: verify

- name: Display runner status
  debug:
    var: runner_status.stdout_lines
  tags: verify