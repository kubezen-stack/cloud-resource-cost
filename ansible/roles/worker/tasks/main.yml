- name: Check is Worker Node is already joined to Cluster
  stat:
    path: /etc/kubernetes/kubelet.conf
  register: kubelet_exists
  tags: join

- name: Wait for join command file to be created
  become: no
  wait_for:
    path: "{{ playbook_dir }}/join-command.sh"
    timeout: 300
  delegate_to: localhost
  when: not kubelet_exists.stat.exists
  tags: join

- name: Copy join command to local file
  copy:
    src: "{{ playbook_dir }}/join-command.sh"
    dest: /tmp/join-command.sh
    mode: 0755
  when: not kubelet_exists.stat.exists
  tags: join

- name: Join Worker Node to Cluster
  shell: /tmp/join-command.sh
  when: not kubelet_exists.stat.exists
  register: join
  tags: join

- name: Check if Worker Node joined to Cluster
  debug:
    var: join.stdout_lines
  when: join is changed
  tags: join

- name: Delete join command
  file:
    path: /tmp/join-command.sh
    state: absent
  tags: cleanup

- name: Wait for kubelet to be ready
  systemd:
    name: kubelet
    state: started
  tags: verify

- name: Display worker node success message
  debug:
    msg: "Worker node successfully joined the cluster"
  when: join is changed
  tags: verify

- name: Get cluster nodes status
  become: no
  shell: kubectl get nodes
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
  delegate_to: "{{ groups['master'][0] }}"
  register: cluster_nodes
  changed_when: false
  tags: verify

- name: Show all cluster nodes
  debug:
    var: cluster_nodes.stdout_lines
  tags: verify
