- name: Wait for Calisco API to be available
  become: no
  command: kubectl get crd felixconfigurations.crd.projectcalico.org
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
  register: calico_ready
  until: calico_ready.rc == 0
  delay: 10
  retries: 20
  tags: wait

- name: Create Calico FelixVXLAN configuration
  become: no
  shell: >
    kubectl apply -f - <<EOF
    apiVersion: projectcalico.org/v3
    kind: FelixConfiguration
    metadata:
      name: default
    spec:
      vxlanEnabled: true
      ipipEnabled: false
      vxlanVNI: 4096
    EOF
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
  register: calico_ready
  changed_when: "'created' in calico_ready.stdout or 'configured' in calico_ready.stdout"
  tags: configure

- name: Create Calico IPPool configuration
  become: no
  shell: >
    kubectl apply -f - <<EOF
    apiVersion: projectcalico.org/v3
    kind: IPPool
    metadata:
      name: default
    spec:
      cidr: {{ pod_network_cidr }}
      natOutgoing: true
      ipipMode: Never
      vxlanMode: Always
      blockSize: 26
    EOF
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
  register: ippool_ready
  changed_when: "'created' in ippool_ready.stdout or 'configured' in ippool_ready.stdout"
  tags: configure

- name: Verify Calico configuration
  become: no
  command: kubectl get felixconfiguration default -o yaml
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
  register: felix_ready
  changed_when: false
  tags: verify

- name: Wait for Calico pods to be ready
  become: no
  command: kubectl get pods -n kube-system -l k8s-app=calico-node --timeout=300s
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
  register: calico_ready
  until: calico_ready.stdout|int > 0
  delay: 10
  retries: 3
  tags: verify

- name: Get Calico pods
  become: no
  command: kubectl get pods -n kube-system -l k8s-app=calico-node --no-headers
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
  register: calico_pods
  changed_when: false
  tags: verify

- name: Display Calico pods
  debug:
    var: calico_pods.stdout_lines
  tags: verify
