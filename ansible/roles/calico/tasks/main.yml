- name: Display CRD readiness status
  ansible.builtin.debug:
    msg: "Calico CRD is established and ready for use"
  tags: wait

- name: Create Calico FelixConfiguration
  become: no
  ansible.builtin.shell: |
    cat <<EOF | kubectl apply -f -
    apiVersion: crd.projectcalico.org/v1
    kind: FelixConfiguration
    metadata:
      name: default
    spec:
      vxlanEnabled: true
      ipipEnabled: false
      vxlanVNI: 4096
      iptablesBackend: NFT
    EOF
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
  register: felix_config_result
  until: felix_config_result.rc == 0
  delay: 15
  retries: 5
  changed_when: "'created' in felix_config_result.stdout or 'configured' in felix_config_result.stdout"
  tags: configure

- name: Display FelixConfiguration result
  ansible.builtin.debug:
    var: felix_config_result.stdout_lines
  tags: configure

- name: Wait for IPPool CRD to be established
  become: no
  ansible.builtin.shell: |
    kubectl get crd ippools.crd.projectcalico.org -o jsonpath='{.status.conditions[?(@.type=="Established")].status}'
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
  register: ippool_crd_ready
  until: ippool_crd_ready.stdout == "True"
  delay: 5
  retries: 30
  changed_when: false
  tags: configure

- name: Create Calico IPPool configuration
  become: no
  ansible.builtin.shell: |
    cat <<EOF | kubectl apply -f -
    apiVersion: crd.projectcalico.org/v1
    kind: IPPool
    metadata:
      name: default-ipv4-ippool
    spec:
      cidr: {{ pod_network_cidr }}
      natOutgoing: true
      ipipMode: Never
      vxlanMode: Always
      blockSize: 26
    EOF
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
  register: ippool_result
  until: ippool_result.rc == 0
  delay: 10
  retries: 10
  changed_when: "'created' in ippool_result.stdout or 'configured' in ippool_result.stdout"
  tags: configure

- name: Display IPPool result
  ansible.builtin.debug:
    var: ippool_result.stdout_lines
  tags: configure

- name: Verify Calico FelixConfiguration
  become: no
  ansible.builtin.command: kubectl get felixconfiguration default -o yaml
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
  register: felix_verify
  changed_when: false
  tags: verify

- name: Display FelixConfiguration
  ansible.builtin.debug:
    msg: "{{ felix_verify.stdout_lines }}"
  tags: verify

- name: Verify Calico IPPool
  become: no
  ansible.builtin.command: kubectl get ippool -o wide
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
  register: ippool_verify
  changed_when: false
  tags: verify

- name: Display IPPool
  ansible.builtin.debug:
    msg: "{{ ippool_verify.stdout_lines }}"
  tags: verify

- name: Wait for Calico pods to be ready
  become: no
  ansible.builtin.shell: kubectl get pods -n kube-system -l k8s-app=calico-node --no-headers | grep -c "Running" || echo "0"
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
  register: calico_pods_running
  until: calico_pods_running.stdout|int >= 1
  delay: 10
  retries: 30
  changed_when: false
  tags: verify

- name: Get Calico pods status
  become: no
  ansible.builtin.command: kubectl get pods -n kube-system -l k8s-app=calico-node --no-headers
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
  register: calico_pods_status
  changed_when: false
  tags: verify

- name: Verify Calico node status
  become: no
  ansible.builtin.command: kubectl get nodes -o wide
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
  register: nodes_status
  changed_when: false
  tags: verify

- name: Display nodes status
  ansible.builtin.debug:
    msg: "{{ nodes_status.stdout_lines }}"
  tags: verify