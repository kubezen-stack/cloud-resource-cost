- name: Check if AWS CLI is installed
  ansible.builtin.command: which aws
  register: aws_cli_check
  ignore_errors: true
  changed_when: false
  tags: ecr_secret

- name: Download AWS CLI
  ansible.builtin.get_url:
    url: "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip"
    dest: "/tmp/awscliv2.zip"
    mode: "0644"
  when: aws_cli_check.rc != 0
  tags: ecr_secret

- name: Unzip AWS CLI
  ansible.builtin.unarchive:
    src: /tmp/awscliv2.zip
    dest: /tmp
    remote_src: yes
  when: aws_cli_check.rc != 0
  tags: ecr_secret

- name: Install AWS CLI
  ansible.builtin.shell: /tmp/aws/install --update
  when: aws_cli_check.rc != 0
  tags: ecr_secret

- name: Check if Helm is already installed
  ansible.builtin.command: which helm
  register: helm_exists
  ignore_errors: true
  changed_when: false
  tags: install

- name: Download Helm installation script
  ansible.builtin.get_url:
    url: https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3
    dest: /tmp/get_helm.sh
    mode: '0700'
  when: helm_exists.rc != 0
  tags: install

- name: Run Helm installation script
  ansible.builtin.shell: /tmp/get_helm.sh
  when: helm_exists.rc != 0
  tags: install

- name: Delete installation script
  ansible.builtin.file:
    path: /tmp/get_helm.sh
    state: absent
  tags: cleanup

- name: Get ECR registry URL
  ansible.builtin.shell: |
    aws ecr describe-repositories \
      --repository-names "cost-optimizer-{{ target_env }}" \
      --query "repositories[0].repositoryUri" \
      --output text | cut -d'/' -f1
  register: ecr_registry_url
  changed_when: false
  tags: ecr_secret

- name: Get ECR authorization token
  ansible.builtin.shell: |
    aws ecr get-login-password --region {{ aws_region | default('us-east-1') }}
  register: ecr_token
  changed_when: false
  tags: ecr_secret

- name: Create cost-optimizer namespace
  ansible.builtin.shell: |
    kubectl create namespace cost-optimizer --dry-run=client -o yaml | kubectl apply -f -
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
  changed_when: false
  tags: ecr_secret

- name: Create imagePullSecret in Kubernetes
  ansible.builtin.shell: |
    kubectl create secret docker-registry ecr-secret \
      --docker-server={{ ecr_registry_url.stdout }} \
      --docker-username=AWS \
      --docker-password={{ ecr_token.stdout }} \
      --namespace cost-optimizer \
      --dry-run=client -o yaml | kubectl apply -f -
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
  changed_when: false
  tags: ecr_secret

- name: Add Helm repositories
  become: no
  kubernetes.core.helm_repository:
    name: "{{ item.name }}"
    repo_url: "{{ item.url }}"
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
  loop:
    - { name: "bitnami", url: "https://charts.bitnami.com/bitnami" }
    - { name: "jetstack", url: "https://charts.jetstack.io" }
    - { name: "ingress-nginx", url: "https://kubernetes.github.io/ingress-nginx" }
  tags: repos

- name: Update Helm repositories
  become: no
  ansible.builtin.command: helm repo update
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
  changed_when: false
  tags: repos

- name: Verify Helm can communicate with Kubernetes
  become: no
  ansible.builtin.command: helm list -A
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
  register: helm_list
  changed_when: false
  tags: verify

- name: Deploy Cost Optimizer Helm Chart
  become: no
  kubernetes.core.helm:
    name: cost-optimizer
    chart_ref: "./helm/cost-optimizer"
    release_namespace: cost-optimizer
    values_files:
      - values.yaml
      - "values-{{ target_env }}.yaml"
    values:
      image:
        repository: "{{ ecr_auth.url | ansible.builtin.regex_replace('^https://', '') }}/cost-optimizer-{{ target_env }}"
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
  tags: deploy

- name: Display Helm test connection
  ansible.builtin.debug:
    msg: "Helm successfully configured and connected to Kubernetes"
  when: helm_list.rc == 0
  tags: verify