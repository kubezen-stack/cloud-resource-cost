- name: Add Docker gpg key
  apt_key:
    url: https://download.docker.com/linux/ubuntu/gpg
    state: present
  tags: containerd

- name: Add Docker repository
  apt_repository:
    repo: deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable
    state: present
    update_cache: yes
  tags: containerd

- name: Install containerd
  apt:
    name: containerd.io
    state: present
  tags: containerd

- name: Create containerd config directory
  file:
    path: /etc/containerd
    state: directory
    mode: "0755"
  tags: containerd

- name: Remove old containerd config if exists
  file:
    path: /etc/containerd/config.toml
    state: absent
  tags: containerd

- name: Generate default containerd config
  shell: containerd config default > /etc/containerd/config.toml
  tags: containerd

- name: Enable SystemdCgroup in containerd (sed method)
  shell: sed -i 's/SystemdCgroup = false/SystemdCgroup = true/g' /etc/containerd/config.toml
  notify: restarted containerd
  tags: containerd

- name: Get ECR registry URL
  shell: |
    aws ecr describe-repositories \
      --repository-names "cost-optimizer-{{ environment }}" \
      --query "repositories[0].repositoryUri" \
      --output text | cut -d'/' -f1
  register: ecr_registry_url
  changed_when: false
  tags: containerd

- name: Install amazon-ecr-credential-helper
  apt:
    name: amazon-ecr-credential-helper
    state: present
  tags: containerd

- name: Create docker config directory for root
  file:
    path: /root/.docker
    state: directory
    mode: "0755"
  tags: containerd

- name: Create docker config directory for ubuntu
  file:
    path: /home/ubuntu/.docker
    state: directory
    owner: ubuntu
    group: ubuntu
    mode: "0755"
  tags: containerd

- name: Configure ECR credential helper for root
  copy:
    dest: /root/.docker/config.json
    content: |
      {
        "credHelpers": {
          "{{ ecr_registry_url.stdout }}": "ecr-login"
        }
      }
    mode: "0644"
  tags: containerd

- name: Configure ECR credential helper for ubuntu
  copy:
    dest: /home/ubuntu/.docker/config.json
    content: |
      {
        "credHelpers": {
          "{{ ecr_registry_url.stdout }}": "ecr-login"
        }
      }
    owner: ubuntu
    group: ubuntu
    mode: "0644"
  tags: containerd

- name: Create ECR registry directory
  file:
    path: "/etc/containerd/certs.d/{{ ecr_registry_url.stdout }}"
    state: directory
    mode: "0755"
  tags: containerd

- name: Create ECR hosts.toml
  copy:
    dest: "/etc/containerd/certs.d/{{ ecr_registry_url.stdout }}/hosts.toml"
    content: |
      server = "https://{{ ecr_registry_url.stdout }}"
      [host."https://{{ ecr_registry_url.stdout }}"]
        capabilities = ["pull", "resolve"]
    mode: "0644"
  notify: restarted containerd
  tags: containerd

- name: Verify the change was applied
  shell: grep -c "SystemdCgroup = true" /etc/containerd/config.toml
  register: systemd_cgroup_count
  changed_when: false
  failed_when: systemd_cgroup_count.stdout == "0"
  tags: containerd

- name: Remove disabled_plugins cri from containerd config
  lineinfile:
    path: /etc/containerd/config.toml
    regexp: '^disabled_plugins\s*=.*'
    state: absent
  notify: restarted containerd
  tags: containerd

- name: Enable and start containerd (without restart yet)
  systemd:
    name: containerd
    state: started
    enabled: yes
    daemon_reload: yes
  tags: containerd

- name: Verify containerd is running
  command: systemctl is-active containerd
  register: containerd_check
  changed_when: false
  failed_when: containerd_check.stdout != "active"
  tags: containerd

- name: Enable SystemdCgroup in containerd
  shell: sed -i 's/SystemdCgroup = false/SystemdCgroup = true/g' /etc/containerd/config.toml
  notify: restarted containerd
  tags: containerd

- name: Verify the change was applied
  shell: grep -c "SystemdCgroup = true" /etc/containerd/config.toml
  register: systemd_cgroup_count
  changed_when: false
  failed_when: systemd_cgroup_count.stdout == "0"
  tags: containerd

- name: Create directory for Kubernetes
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"
  tags: k8s_packages

- name: Add Kubernetes GPG key
  shell: |
    curl -fsSL https://pkgs.k8s.io/core:/stable:/v{{ kubernetes_version }}/deb/Release.key | \
    gpg --dearmor -o /etc/apt/keyrings/kubernetes-apt-keyring.gpg
  args:
    creates: /etc/apt/keyrings/kubernetes-apt-keyring.gpg
  tags: k8s_packages

- name: Add Kubernetes repository
  apt_repository:
    repo: "deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg] https://pkgs.k8s.io/core:/stable:/v{{ kubernetes_version }}/deb/ /"
    state: present
    update_cache: yes
  tags: k8s_packages

- name: Install kubeadm, kubelet and kubectl
  apt:
    name:
      - kubeadm
      - kubelet
      - kubectl
    state: present
    update_cache: yes
  notify: restarted kubelet
  tags: k8s_packages

- name: Hold kubeadm, kubelet and kubectl
  dpkg_selections:
    name: "{{ item }}"
    selection: hold
  loop:
    - kubeadm
    - kubelet
    - kubectl
  tags: k8s_packages

- name: Enable kubelet service (will start after kubeadm init)
  systemd:
    name: kubelet
    enabled: yes
    daemon_reload: yes
  tags: k8s_packages

- name: Flush all handlers to restart services
  meta: flush_handlers
  tags: verify

- name: Wait for services to stabilize
  wait_for:
    timeout: 10
  delegate_to: localhost
  become: no
  tags: verify

- name: Verify containerd is running (final check)
  systemd:
    name: containerd
    state: started
  register: containerd_status
  ignore_errors: yes
  tags: verify

- name: Display containerd status
  debug:
    msg: "Containerd status: {{ containerd_status.status.ActiveState | default('unknown') }}"
  when: containerd_status is defined
  tags: verify
