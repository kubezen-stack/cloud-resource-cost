- name: Add Docker gpg key
  apt_key:
    url: https://download.docker.com/linux/ubuntu/gpg
    state: present
  tags: containerd

- name: Add Docker repository
  apt_repository:
    repo: deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable
    state: present
    update_cache: yes
  tags: containerd

- name: Install containerd
  apt:
    name: containerd.io
    state: present
  tags: containerd

- name: Create containerd config directory
  file:
    path: /etc/containerd
    state: directory
    mode: "0755"
  tags: containerd

- name: Generate default containerd config
  shell: containerd config default > /etc/containerd/config.toml
  args:
    creates: /etc/containerd/config.toml
  tags: containerd

- name: Enable SystemdCgroup in containerd
  lineinfile:
    path: /etc/containerd/config.toml
    regexp: '^\s+SystemdCgroup\s*=\s*false'
    line: "            SystemdCgroup = true"
  notify: restarted containerd
  tags: containerd

- name: Remove disabled_plugins cri from containerd config
  lineinfile:
    path: /etc/containerd/config.toml
    regexp: '^disabled_plugins\s*=.*'
    state: absent
  notify: restarted containerd
  tags: containerd

- name: Ensure containerd is restarted if config changed
  meta: flush_handlers
  tags: containerd

- name: Enable and start containerd
  systemd:
    name: containerd
    state: started
    enabled: yes
    daemon_reload: yes
  tags: containerd

- name: Wait for containerd to be fully ready
  wait_for:
    timeout: 10
  tags: containerd

- name: Verify containerd is running
  command: systemctl is-active containerd
  register: containerd_check
  changed_when: false
  failed_when: containerd_check.stdout != "active"
  tags: containerd

- name: Create directory for Kubernetes
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"
  tags: k8s_packages

- name: Add Kubernetes GPG key
  shell: |
    curl -fsSL https://pkgs.k8s.io/core:/stable:/v{{ kubernetes_version }}/deb/Release.key | \
    gpg --dearmor -o /etc/apt/keyrings/kubernetes-apt-keyring.gpg
  args:
    creates: /etc/apt/keyrings/kubernetes-apt-keyring.gpg
  tags: k8s_packages

- name: Add Kubernetes repository
  apt_repository:
    repo: "deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg] https://pkgs.k8s.io/core:/stable:/v{{ kubernetes_version }}/deb/ /"
    state: present
    update_cache: yes
  tags: k8s_packages

- name: Install kubeadm, kubelet and kubectl
  apt:
    name:
      - kubeadm
      - kubelet
      - kubectl
    state: present
    update_cache: yes
  notify: restarted kubelet
  tags: k8s_packages

- name: Hold kubeadm, kubelet and kubectl
  dpkg_selections:
    name: "{{ item }}"
    selection: hold
  loop:
    - kubeadm
    - kubelet
    - kubectl
  tags: k8s_packages

- name: Enable kubelet service (will start after kubeadm init)
  systemd:
    name: kubelet
    enabled: yes
    daemon_reload: yes
  tags: k8s_packages

- name: Verify containerd is running (final check)
  systemd:
    name: containerd
    state: started
  register: containerd_status
  ignore_errors: yes
  tags: verify

- name: Display containerd status
  debug:
    msg: "Containerd status: {{ containerd_status.status.ActiveState | default('unknown') }}"
  when: containerd_status is defined
  tags: verify
