- name: Remove old Docker repo list if exists
  ansible.builtin.file:
    path: /etc/apt/sources.list.d/docker.list
    state: absent
  tags: containerd

- name: Remove old Docker GPG key if exists
  ansible.builtin.file:
    path: /etc/apt/keyrings/docker.gpg
    state: absent
  tags: containerd

- name: Add Docker gpg key
  ansible.builtin.shell: |
    curl -fsSL https://download.docker.com/linux/ubuntu/gpg | \
    gpg --dearmor | \
    tee /etc/apt/keyrings/docker.gpg > /dev/null
    chmod 644 /etc/apt/keyrings/docker.gpg
  tags: containerd

- name: Add Docker repository
  ansible.builtin.apt_repository:
    repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
    filename: docker
    state: present
    update_cache: yes
  tags: containerd

- name: Install containerd
  ansible.builtin.apt:
    name: containerd.io
    state: present
  tags: containerd

- name: Create containerd config directory
  ansible.builtin.file:
    path: /etc/containerd
    state: directory
    mode: "0755"
  tags: containerd

- name: Remove old containerd config if exists
  ansible.builtin.file:
    path: /etc/containerd/config.toml
    state: absent
  tags: containerd

- name: Generate default containerd config
  ansible.builtin.shell: containerd config default > /etc/containerd/config.toml
  tags: containerd

- name: Configure containerd (SystemdCgroup and config_path)
  ansible.builtin.lineinfile:
    path: /etc/containerd/config.toml
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
  loop:
    - { regexp: 'SystemdCgroup\s*=\s*false', line: '            SystemdCgroup = true' }
    - { regexp: 'config_path\s*=\s*""', line: '      config_path = "/etc/containerd/certs.d"' }
  notify: restarted containerd
  tags: containerd

- name: Get ECR registry URL
  ansible.builtin.shell: |
    aws ecr describe-repositories \
      --repository-names "cost-optimizer-{{ target_env }}" \
      --query "repositories[0].repositoryUri" \
      --output text | cut -d'/' -f1
  register: ecr_registry_url
  changed_when: false
  tags: containerd

- name: Install amazon-ecr-credential-helper
  ansible.builtin.apt:
    name: amazon-ecr-credential-helper
    state: present
  tags: containerd

- name: Create docker config directory for root
  ansible.builtin.file:
    path: /root/.docker
    state: directory
    mode: "0700"
  tags: containerd

- name: Create docker config directory for ubuntu
  ansible.builtin.file:
    path: /home/ubuntu/.docker
    state: directory
    owner: ubuntu
    group: ubuntu
    mode: "0700"
  tags: containerd

- name: Configure ECR credential helper (root)
  ansible.builtin.copy:
    dest: /root/.docker/config.json
    content: |
      {
        "credHelpers": {
          "{{ ecr_registry_url.stdout }}": "ecr-login"
        }
      }
    mode: "0600"
  tags: containerd

- name: Configure ECR credential helper (ubuntu)
  ansible.builtin.copy:
    dest: /home/ubuntu/.docker/config.json
    content: |
      {
        "credHelpers": {
          "{{ ecr_registry_url.stdout }}": "ecr-login"
        }
      }
    owner: ubuntu
    group: ubuntu
    mode: "0600"
  tags: containerd

- name: Create ECR registry directory
  ansible.builtin.file:
    path: "/etc/containerd/certs.d/{{ ecr_registry_url.stdout }}"
    state: directory
    mode: "0755"
  notify: restarted containerd
  tags: containerd

- name: Create ECR hosts.toml
  ansible.builtin.copy:
    dest: "/etc/containerd/certs.d/{{ ecr_registry_url.stdout }}/hosts.toml"
    content: |
      server = "https://{{ ecr_registry_url.stdout }}"
      [host."https://{{ ecr_registry_url.stdout }}"]
        capabilities = ["pull", "resolve"]
  notify: restarted containerd
  tags: containerd

- name: Ensure CRI plugin is not disabled
  ansible.builtin.lineinfile:
    path: /etc/containerd/config.toml
    regexp: '^disabled_plugins\s*='
    line: 'disabled_plugins = []'
  notify: restarted containerd
  tags: containerd

- name: Create directory for Kubernetes
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"
  tags: k8s_packages

- name: Remove old Kubernetes repo list if exists
  ansible.builtin.file:
    path: /etc/apt/sources.list.d/kubernetes.list
    state: absent
  tags: k8s_packages

- name: Remove old Kubernetes GPG key if exists
  ansible.builtin.file:
    path: /etc/apt/keyrings/kubernetes-apt-keyring.gpg
    state: absent
  tags: k8s_packages

- name: Add Kubernetes GPG key
  ansible.builtin.shell: |
    curl -fsSL https://pkgs.k8s.io/core:/stable:/v{{ kubernetes_version }}/deb/Release.key | \
    gpg --dearmor | \
    tee /etc/apt/keyrings/kubernetes-apt-keyring.gpg > /dev/null
    chmod 644 /etc/apt/keyrings/kubernetes-apt-keyring.gpg
  tags: k8s_packages

- name: Add Kubernetes repository
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg] https://pkgs.k8s.io/core:/stable:/v{{ kubernetes_version }}/deb/ /"
    state: present
    update_cache: yes
  tags: k8s_packages

- name: Install kubeadm, kubelet and kubectl
  ansible.builtin.apt:
    name:
      - kubeadm
      - kubelet
      - kubectl
    state: present
    update_cache: yes
  notify: restarted kubelet
  tags: k8s_packages

- name: Hold kubeadm, kubelet and kubectl
  ansible.builtin.shell: apt-mark hold {{ item }}
  loop:
    - kubeadm
    - kubelet
    - kubectl
  changed_when: false
  tags: k8s_packages

- name: Enable kubelet service
  ansible.builtin.systemd:
    name: kubelet
    enabled: yes
    daemon_reload: yes
  tags: k8s_packages

- name: Flush all handlers to restart services
  ansible.builtin.meta: flush_handlers
  tags: verify

- name: Wait for services to stabilize
  ansible.builtin.wait_for:
    timeout: 10
  delegate_to: localhost
  become: no
  tags: verify

- name: Verify containerd is running
  ansible.builtin.systemd:
    name: containerd
    state: started
  register: containerd_status
  ignore_errors: yes
  tags: verify

- name: Display containerd status
  ansible.builtin.debug:
    msg: "Containerd status: {{ containerd_status.status.ActiveState | default('unknown') }}"
  when: containerd_status is defined
  tags: verify