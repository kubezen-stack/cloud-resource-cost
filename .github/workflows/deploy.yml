name: Deploy

on:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "helm/**"
      - "docker/**"

  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - stage
          - prod
      image_tag:
        description: "Docker image tag (default: git sha)"
        required: false
        default: ""

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  TF_VERSION: "1.6.0"
  ENVIRONMENT: ${{ github.event.inputs.environment || 'dev' }}

jobs:
  build-and-push:
    name: "Build and Push Docker Image"
    runs-on: "ubuntu-latest"
    needs: sonarcloud
    environment: "${{ github.event.inputs.environment || 'dev' }}"
    outputs:
      image_tag: ${{ steps.image_tag.outputs.TAG }}
      ecr_url: ${{ steps.tf_outputs.outputs.ecr_url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # v6.0.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4.0.0
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: terraform/environments/${{ env.ENVIRONMENT }}
        run: terraform init

      - name: Get ECR URL from terraform
        id: tf_outputs
        working-directory: terraform/environments/${{ env.ENVIRONMENT }}
        run: |
          ECR_URL=$(terraform output -raw ecr_repository_url)
          echo "ECR_URL is: ${ECR_URL}"
          echo "ecr_url=${ECR_URL}" >> $GITHUB_OUTPUT

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@183a1442edf41672e66566b7fc560e297a290896 # v2.1.1

      - name: Set Image Tag
        id: image_tag
        run: |
          if [ -n "${{ github.event.inputs.image_tag }}" ]; then
            TAG="${{ github.event.inputs.image_tag }}"
          else
            TAG="${{ github.sha }}"
          fi
          echo "TAG=${TAG}" >> $GITHUB_OUTPUT

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Build Docker Image
        run: |
          docker buildx build \
          --cache-from type=gha \
          --cache-to type=gha,mode=max \
          -f docker/Dockerfile \
          -t ${{ steps.tf_outputs.outputs.ecr_url }}:${{ steps.image_tag.outputs.TAG }} \
          -t ${{ steps.tf_outputs.outputs.ecr_url }}:${{ env.ENVIRONMENT }} \
          --load .

      - name: Run Trivy scanner
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: "${{ steps.tf_outputs.outputs.ecr_url }}:${{ steps.image_tag.outputs.TAG }}"
          format: 'json'
          output: 'trivy-results.json'
          severity: 'CRITICAL,HIGH'
          
      - name: Upload Trivy scan results
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: trivy-security-report
          path: trivy-results.json
          retention-days: 7

      - name: Push Docker Image
        run: |
          docker push ${{ steps.tf_outputs.outputs.ecr_url }}:${{ steps.image_tag.outputs.TAG }}
          docker push ${{ steps.tf_outputs.outputs.ecr_url }}:${{ env.ENVIRONMENT }}

  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0
        with:
          fetch-depth: 0
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@ffc3010689be73b8e5ae0c57ce35968afd7909e8 # v5.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  run-tests:
    name: "Run Tests"
    runs-on: "self-hosted"
    environment: "${{ github.event.inputs.environment || 'dev' }}"
    needs: helm-deploy-dev
    if: ${{ github.event.inputs.environment == 'dev' || github.event_name == 'push' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # v6.0.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Get kubeconfig from Secrets Manager
        run: |
          KUBECONFIG_DATA=$(aws secretsmanager get-secret-value \
            --secret-id "cost-optimizer-dev-kubeconfig" \
            --query SecretString \
            --output text)
          mkdir -p ~/.kube
          echo "$KUBECONFIG_DATA" > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Wait for app to be ready
        run: |
          kubectl wait --for=condition=ready pod \
            -l app.kubernetes.io/name=cost-optimizer \
            -n cost-optimizer \
            --timeout=120s

      - name: Port forward service
        run: |
          pkill -f "port-forward" || true
          kubectl port-forward svc/cost-optimizer 8888:80 -n cost-optimizer &
          sleep 10

      - name: Setup Python
        uses: actions/setup-python@83679a892e2d95755f2dac6acb0bfd1e9ac5d548 # v6.1.0
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: |
          cd src
          pip install -r requirements.txt

      - name: Run unit tests
        run: |
          cd src
          pytest tests/unit/ -v --junitxml=unit-results.xml
        continue-on-error: true

      - name: Run integration tests
        run: |
          cd src
          pytest tests/integration/ -v --junitxml=integration-results.xml
        continue-on-error: true

      - name: Run smoke tests
        env:
          APP_URL: "http://127.0.0.1:8888"
        run: |
          cd src
          pytest tests/smoke/ -v --junitxml=smoke-results.xml

      - name: Upload test results
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        if: always()
        with:
          name: test-results
          path: |
            src/unit-results.xml
            src/integration-results.xml
            src/smoke-results.xml
          retention-days: 5
      
      - name: Cleanup port-forward
        if: always()
        run: pkill -f "port-forward" || true

  helm-deploy-dev:
    name: "Helm Deploy(dev)"
    runs-on: "self-hosted"
    environment: "${{ github.event.inputs.environment || 'dev' }}"
    needs: [build-and-push, sonarcloud]
    if: ${{ github.event.inputs.environment == 'dev' || github.event_name == 'push' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # v6.0.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Cache Cost-Optimizer Charts
        uses: actions/cache@a7833574556fa59680c1b7cb190c1735db73ebf0 # v5.0.0
        with:
          path: helm/cost-optimizer/charts
          key: ${{ runner.os }}-cost-optimizer-${{ hashFiles('helm/cost-optimizer/Chart.yaml', 'helm/cost-optimizer/Chart.lock') }}

      - name: Get ECR URL from terraform
        id: ecr
        run: |
          cd terraform/environments/${{ env.ENVIRONMENT }}
          terraform init
          ECR_URL=$(terraform output -raw ecr_repository_url)
          echo "ecr_url=${ECR_URL}" >> $GITHUB_OUTPUT

      - name: Get kubeconfig from Secrets Manager
        run: |
          KUBECONFIG_DATA=$(aws secretsmanager get-secret-value \
            --secret-id "cost-optimizer-dev-kubeconfig" \
            --query SecretString \
            --output text)
          mkdir -p ~/.kube
          echo "$KUBECONFIG_DATA" > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Setup kubectl
        uses: azure/setup-kubectl@15650b3ad78fff148532a140b8a4c821796b2d7b # v5.0.0

      - name: Setup Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
        with:
          version: "v3.14.0"

      - name: Helm install dependencies
        run: |
          helm repo add bitnami https://charts.bitnami.com/bitnami
          helm repo update

      - name: Helm build dependencies
        run: |
          for i in {1..3}; do
            helm dependency build ./helm/cost-optimizer && break || \
            (echo "Attempt $i failed, retrying in 5s..." && sleep 5)
          done
      
      - name: Create ECR Secret in K8s
        run: |
          ECR_PASSWORD=$(aws ecr get-login-password --region ${{ secrets.AWS_REGION }})
          kubectl create namespace cost-optimizer --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret docker-registry ecr-secret \
            --docker-server=${{ steps.ecr.outputs.ecr_url }} \
            --docker-username=AWS \
            --docker-password="$ECR_PASSWORD" \
            --namespace cost-optimizer \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Helm deploy
        env:
          APP_SECRET: ${{ secrets.DEV_SECRET_KEY }}
          DB_PASS: ${{ secrets.DEV_DB_PASSWORD }}
        run: |
          helm upgrade --install cost-optimizer ./helm/cost-optimizer \
          -f ./helm/cost-optimizer/values-dev.yaml \
          --set image.repository=${{ steps.ecr.outputs.ecr_url }} \
          --set image.tag=${{ needs.build-and-push.outputs.image_tag }} \
          --set app.secretKey=$APP_SECRET \
          --set database.password=$DB_PASS \
          --set postgresql.auth.password=$DB_PASS \
          --namespace cost-optimizer \
          --create-namespace \
          --timeout 600s \
          --wait

  helm-deploy-monitoring-dev:
    name: "Helm Deploy Monitoring(dev)"
    runs-on: "self-hosted"
    environment: "${{ github.event.inputs.environment || 'dev' }}"
    needs: build-and-push
    if: ${{ github.event.inputs.environment == 'dev' || github.event_name == 'push' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0

      - name: Cache Monitoring Charts
        uses: actions/cache@a7833574556fa59680c1b7cb190c1735db73ebf0 # v5.0.0
        with:
          path: helm/monitoring/charts
          key: ${{ runner.os }}-monitoring-${{ hashFiles('helm/monitoring/Chart.yaml', 'helm/monitoring/Chart.lock') }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # v6.0.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Get kubeconfig from Secrets Manager
        run: |
          KUBECONFIG_DATA=$(aws secretsmanager get-secret-value \
            --secret-id "cost-optimizer-dev-kubeconfig" \
            --query SecretString \
            --output text)
          mkdir -p ~/.kube
          echo "$KUBECONFIG_DATA" > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Setup Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
        with:
          version: "v3.14.0"

      - name: Helm install dependencies
        run: |
          helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
          helm repo add victoriametrics https://victoriametrics.github.io/helm-charts
          helm repo add grafana https://grafana.github.io/helm-charts
          helm repo update

      - name: Helm update monitoring dependencies
        run: |
          for i in {1..3}; do
            helm dependency build ./helm/monitoring && break || \
            (echo "Attempt $i failed, retrying in 5s..." && sleep 5)
          done

      - name: Helm deploy monitoring
        run: |
          helm upgrade --install monitoring ./helm/monitoring \
          -f ./helm/monitoring/values-dev.yaml \
          --namespace monitoring \
          --create-namespace \
          --timeout 600s \
          --wait

  argo-cd-dev:
    name: "ArgoCD Deploy(dev)"
    runs-on: "self-hosted"
    environment: "${{ github.event.inputs.environment || 'dev' }}"
    needs: build-and-push
    if: ${{ github.event.inputs.environment == 'dev' || github.event_name == 'push' }}
    steps:
    - name: Checkout code
      uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # v6.0.0
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Get kubeconfig from Secrets Manager
      run: |
        KUBECONFIG_DATA=$(aws secretsmanager get-secret-value \
          --secret-id "cost-optimizer-dev-kubeconfig" \
          --query SecretString \
          --output text)
        mkdir -p ~/.kube
        echo "$KUBECONFIG_DATA" > ~/.kube/config
        chmod 600 ~/.kube/config

    - name: Setup Helm
      uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
      with:
        version: "v3.14.0"

    - name: Cache ArgoCD Charts
      uses: actions/cache@a7833574556fa59680c1b7cb190c1735db73ebf0 # v5.0.0
      with:
        path: helm/argocd/charts
        key: ${{ runner.os }}-argocd-${{ hashFiles('helm/argocd/Chart.yaml', 'helm/argocd/Chart.lock') }}

    - name: Helm install dependencies
      run: |
        helm repo add argo https://argoproj.github.io/argo-helm
        helm repo update

    - name: Helm update ArgoCD dependencies
      run: |
        helm repo add argo https://argoproj.github.io/argo-helm
        helm repo update
        
        rm -rf ./helm/argocd/charts

        for i in {1..3}; do
          helm dependency update ./helm/argocd && break || \
          (echo "Attempt $i failed, retrying in 5s..." && sleep 5)
        done

    - name: Helm deploy ArgoCD
      run: |
        helm upgrade --install argocd ./helm/argocd \
          -f ./helm/argocd/values-dev.yaml \
          --namespace argocd \
          --create-namespace \
          --timeout 300s \
          --wait

    - name: Save ArgoCD password to Secrets Manager
      run: |
        ARGOCD_PASSWORD=$(kubectl -n argocd get secret argocd-initial-admin-secret \
          -o jsonpath="{.data.password}" | base64 -d)
        
        aws secretsmanager create-secret \
          --name "cost-optimizer-dev-argocd-password" \
          --secret-string "$ARGOCD_PASSWORD" \
          --region ${{ secrets.AWS_REGION }} || \
        aws secretsmanager update-secret \
          --secret-id "cost-optimizer-dev-argocd-password" \
          --secret-string "$ARGOCD_PASSWORD" \
          --region ${{ secrets.AWS_REGION }}

    - name: Get EC2 Public IP
      id: ec2_ip
      run: |
        EC2_IP=$(aws ec2 describe-instances \
          --filters "Name=tag:Name,Values=cost-optimizer-dev-node-1" \
                   "Name=instance-state-name,Values=running" \
          --query 'Reservations[0].Instances[0].PublicIpAddress' \
          --output text)
        echo "ec2_ip=${EC2_IP}" >> $GITHUB_OUTPUT

    - name: Install ArgoCD CLI
      run: |
        curl -sSL -o argocd-linux-amd64 https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
        chmod +x argocd-linux-amd64

    - name: ArgoCD Login
      run: |
        sleep 30
        ARGOCD_PASSWORD=$(aws secretsmanager get-secret-value \
          --secret-id "cost-optimizer-dev-argocd-password" \
          --query SecretString \
          --output text)
        
        ./argocd-linux-amd64 login ${{ steps.ec2_ip.outputs.ec2_ip }}:30808 \
          --insecure \
          --username admin \
          --password "$ARGOCD_PASSWORD"
          --grpc-web

  notify:
    name: "Final Notification"
    runs-on: ubuntu-latest
    needs: [build-and-push, sonarcloud, helm-deploy-dev, run-tests, helm-deploy-monitoring-dev, argo-cd-dev]
    if: always()
    steps:
      - name: Send Telegram Notification
        uses: appleboy/telegram-action@221e6b684967abe813051ee4a37dd61770a83ad3 # v1.0.1
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          format: markdown
          message: |
            ${{ (needs.run-tests.result == 'success' && needs.helm-deploy-monitoring-dev.result == 'success') && '✅' || '❌' }} *CI/CD Pipeline Finished*
            
            *Repository:* `${{ github.repository }}`
            *Env:* `${{ env.ENVIRONMENT }}`
            *Trigger:* `${{ github.event_name }}`
            
            *Results:*
            - Build & Push: `${{ needs.build-and-push.result }}`
            - SonarCloud: `${{ needs.sonarcloud.result }}`
            - Deploy App: `${{ needs.helm-deploy-dev.result }}`
            - Tests: `${{ needs.run-tests.result }}`
            - Monitoring: `${{ needs.helm-deploy-monitoring-dev.result }}`
            - ArgoCD: `${{ needs.argo-cd-dev.result }}`
            
            [View Workflow Run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})