name: Ansible

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - stage
          - prod
      playbook:
        description: "Playbook to run"
        required: true
        default: "site_k8s.yml"
        type: choice
        options:
          - site_k3s.yml
          - site_k8s.yml
          - common.yml
          - master_k8s.yml
          - calico.yml
          - worker_k8s.yml
          - helm_group.yml
          - github_runner.yml

env:
  TF_VERSION: "1.11.4"

jobs:
  ansible:
    name: "Ansible Provision"
    runs-on: "ubuntu-latest"
    environment: "${{ github.event.inputs.environment || 'dev' }}"

    steps:
      - name: Checkout
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0

      - name: Setup AWS Credentials
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # v6.0.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: terraform/environments/${{ github.event.inputs.environment }}
        run: terraform init

      - name: Get SSH name from terraform
        id: tf_outputs
        working-directory: terraform/environments/${{ github.event.inputs.environment }}
        run: |
          SSH_SECRET=$(terraform output -raw ssh_secret_name)
          echo "ssh_secret=${SSH_SECRET}" >> $GITHUB_OUTPUT

      - name: Get SSH key from Secrets Manager
        id: get_ssh_key
        run: |
          mkdir -p /home/runner/.ssh
          
          aws secretsmanager get-secret-value \
            --secret-id ${{ steps.tf_outputs.outputs.ssh_secret }} \
            --query SecretString \
            --output text \
          | jq -r '.private_key' > /home/runner/.ssh/deploy_key.pem
          
          chmod 600 /home/runner/.ssh/deploy_key.pem
          echo "private_key=/home/runner/.ssh/deploy_key.pem" >> $GITHUB_OUTPUT

      - name: Cache SSH key
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ~/.ssh/deploy_key.pem
          key: ssh-key-${{ github.event.inputs.environment }}-${{ hashFiles('ansible/inventory/*/group_vars/all.yml') }}
          restore-keys: |
            ssh-key-${{ github.event.inputs.environment }}-

      - name: Setup Python
        uses: actions/setup-python@83679a892e2d95755f2dac6acb0bfd1e9ac5d548 # v6.1.0
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-ansible-${{ hashFiles('ansible/requirements.yml') }}
          restore-keys: |
            pip-${{ runner.os }}-ansible-

      - name: Cache Ansible dependencies
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ~/.ansible/collections
          key: ansible-${{ runner.os }}-${{ github.event.inputs.environment }}-${{ hashFiles('ansible/requirements.yml') }}
          restore-keys: |
            ansible-${{ runner.os }}-${{ github.event.inputs.environment }}-
            ansible-${{ runner.os }}-

      - name: Clone k3s-ansible repository
        if: github.event.inputs.playbook == 'site_k3s.yml'
        run: |
          git clone --depth 1 --branch main \
            https://github.com/k3s-io/k3s-ansible.git \
            ansible/k3s-ansible

      - name: Install Ansible and dependencies
        run: |
          python3 -m pip install ansible-core boto3 botocore kubernetes
          ansible-galaxy collection install -r ansible/requirements.yml -p ./ansible/collections --force

      - name: Run Ansible playbook
        working-directory: ansible
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
          ANSIBLE_COLLECTIONS_PATH: "./collections"
          RUNNER_PAT: ${{ secrets.GH_RUNNER_PAT }}
          RUNNER_ENV: "${{ github.event.inputs.environment || 'dev' }}"
        run: |
          ansible-playbook \
            -i inventory/${RUNNER_ENV}/aws_ec2.yml \
            playbooks/${{ github.event.inputs.playbook }} \
            --private-key ${{ steps.get_ssh_key.outputs.private_key }} \
            --extra-vars "github_pat=${RUNNER_PAT} target_env=${RUNNER_ENV} token=${{ secrets.K3S_TOKEN }}" \
            -v \
            -f 10

      - name: Get master instance IP
        id: master_ip
        run: |
          MASTER_IP=$(aws ec2 describe-instances \
            --filters \
              "Name=tag:Role,Values=master" \
              "Name=tag:Environment,Values=${{ github.event.inputs.environment }}" \
              "Name=tag:Project,Values=cost-optimizer" \
              "Name=instance-state-name,Values=running" \
            --query "Reservations[0].Instances[0].PublicIpAddress" \
            --output text)
          echo "master_ip=${MASTER_IP}" >> $GITHUB_OUTPUT

      - name: Get kubeconfig from master node (k8s or k3s)
        if: contains(fromJson('["site_k8s.yml", "site_k3s.yml", "master_k8s.yml"]'), github.event.inputs.playbook)
        id: kubeconfig
        run: |
          MASTER_IP=${{ steps.master_ip.outputs.master_ip }}

          if [[ "${{ github.event.inputs.playbook }}" == "site_k3s.yml" ]]; then
            KUBECONFIG=$(ssh -i /home/runner/.ssh/deploy_key.pem \
              -o StrictHostKeyChecking=no \
              -o UserKnownHostsFile=/dev/null \
              ubuntu@${MASTER_IP} \
              "sudo cat /etc/rancher/k3s/k3s.yaml | \
               sed 's/127.0.0.1/${MASTER_IP}/g'")
          else
            KUBECONFIG=$(ssh -i /home/runner/.ssh/deploy_key.pem \
              -o StrictHostKeyChecking=no \
              -o UserKnownHostsFile=/dev/null \
              ubuntu@${MASTER_IP} \
              "cat ~/.kube/config")
          fi

          SECRET_NAME="cost-optimizer-${{ github.event.inputs.environment }}-kubeconfig"

          aws secretsmanager put-secret-value \
            --secret-id "${SECRET_NAME}" \
            --secret-string "$KUBECONFIG" \
            2>/dev/null || \
          aws secretsmanager create-secret \
            --name "${SECRET_NAME}" \
            --description "Kubeconfig for cost-optimizer ${{ github.event.inputs.environment }} cluster" \
            --secret-string "$KUBECONFIG"

          echo "kubeconfig_secret=${SECRET_NAME}" >> $GITHUB_OUTPUT
          echo "Kubeconfig saved to Secrets Manager"