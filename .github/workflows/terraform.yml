name: Terraform

on:
  push:
    branches:
      - "main"
    paths:
      - "terraform/**"
  pull_request:
    branches:
      - "main"
    paths:
      - "terraform/**"
  workflow_dispatch:
    inputs:
      action:
        description: "Action to run"
        required: true
        default: "plan"
        type: choice
        options:
          - plan
          - apply
          - destroy
      environment:
        description: "Environment"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - stage
          - prod

env:
  TF_VERSION: "1.11.4"
  WORKING_DIR: "terraform/environments/${{ github.event.inputs.environment || 'dev' }}"
  TARGET_ENV: "${{ github.event.inputs.environment || 'dev' }}"

jobs:
  terraform-plan:
    name: "Terraform Plan"
    runs-on: "ubuntu-latest"
    environment: "${{ github.event.inputs.environment || 'dev' }}"

    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    steps:
      - name: Checkout
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0

      - name: Setup AWS Credentials
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # v6.0.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Create Terraform plugin cache dir
        run: mkdir -p $HOME/.terraform.d/plugin-cache

      - name: Cache Terraform plugins
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            ${{ env.HOME }}/.terraform.d/plugin-cache
            ${{ env.WORKING_DIR }}/.terraform
          key: terraform-${{ env.TARGET_ENV }}-${{ hashFiles('**/*.tf', '**/*.tfvars') }}
          restore-keys: |
            terraform-${{ env.TARGET_ENV }}-

      - name: Terraform Init
        run: terraform init -input=false -migrate-state
        env:
          TF_PLUGIN_CACHE_DIR: $HOME/.terraform.d/plugin-cache

      - name: Terraform format
        run: terraform fmt -check -recursive -diff

      - name: Terraform Validate
        run: terraform validate -json
        continue-on-error: true

      - name: Terraform Plan
        run: |
          terraform plan \
          -var="environment=${{ env.TARGET_ENV }}" \
          -out=tfplan-${{ env.TARGET_ENV }} \
          -input=false \
          -lock=true
        env:
          TF_PLUGIN_CACHE_DIR: $HOME/.terraform.d/plugin-cache

      - name: Upload Terraform Plan
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: tfplan-${{ env.TARGET_ENV }}
          path: ${{ env.WORKING_DIR }}/tfplan-${{ env.TARGET_ENV }}
          retention-days: 5

  terraform-apply:
    name: "Terraform Apply"
    runs-on: "ubuntu-latest"
    environment: "${{ github.event.inputs.environment || 'dev' }}"
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply' }}
    needs: terraform-plan

    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    steps:
      - name: Checkout
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0

      - name: Setup AWS Credentials
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # v6.0.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Create Terraform plugin cache dir
        run: mkdir -p $HOME/.terraform.d/plugin-cache

      - name: Cache Terraform plugins
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            ${{ env.HOME }}/.terraform.d/plugin-cache
            ${{ env.WORKING_DIR }}/.terraform
          key: terraform-${{ env.TARGET_ENV }}-${{ hashFiles('**/*.tf', '**/*.tfvars') }}
          restore-keys: |
            terraform-${{ env.TARGET_ENV }}-

      - name: Terraform Init
        run: terraform init -input=false -migrate-state
        env:
          TF_PLUGIN_CACHE_DIR: $HOME/.terraform.d/plugin-cache

      - name: Download Plan
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6.0.0
        with:
          name: tfplan-${{ env.TARGET_ENV }}
          path: ${{ env.WORKING_DIR }}

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan-${{ env.TARGET_ENV }}
        env:
          TF_PLUGIN_CACHE_DIR: $HOME/.terraform.d/plugin-cache

      - name: Save Terraform Outputs
        id: tf_outputs
        run: |
          echo "ecr_url=$(terraform output -raw ecr_repository_url 2>/dev/null | tail -n1)" >> $GITHUB_OUTPUT

      - name: Update GitHub Env
        run: |
          echo "ECR_REPOSITORY_URL=${{ steps.tf_outputs.outputs.ecr_url }}" >> $GITHUB_ENV

  terraform-destroy:
    name: "Terraform Destroy"
    runs-on: "ubuntu-latest"
    environment: "${{ github.event.inputs.environment }}"
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'destroy' }}

    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    steps:
      - name: Checkout
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0

      - name: Setup AWS Credentials
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # v6.0.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Create Terraform plugin cache dir
        run: mkdir -p $HOME/.terraform.d/plugin-cache

      - name: Cache Terraform plugins
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            ${{ env.HOME }}/.terraform.d/plugin-cache
            ${{ env.WORKING_DIR }}/.terraform
          key: terraform-${{ env.TARGET_ENV }}-${{ hashFiles('**/*.tf', '**/*.tfvars') }}
          restore-keys: |
            terraform-${{ env.TARGET_ENV }}-

      - name: Terraform Init
        run: terraform init -input=false -migrate-state
        env:
          TF_PLUGIN_CACHE_DIR: $HOME/.terraform.d/plugin-cache

      - name: Terraform Destroy
        run: |
          terraform destroy \
          -var="environment=${{ github.event.inputs.environment || 'dev' }}" \
          -auto-approve \
          -input=false \
          -lock=false
        env:
          TF_PLUGIN_CACHE_DIR: $HOME/.terraform.d/plugin-cache