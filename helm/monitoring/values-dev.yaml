victoria-metrics-single:
  enabled: true
  server:
    retentionPeriod: 3d
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 1Gi
    persistentVolume:
      enabled: false

victoria-metrics-agent:
  enabled: true
  remoteWrite:
    - url: "http://monitoring-victoria-metrics-single-server:8428/api/v1/write"
  extraArgs:
    envflag.enable: "true"
    envflag.prefix: "VM_"
    loggerFormat: json
    remoteWrite.url: "http://monitoring-victoria-metrics-single-server:8428/api/v1/write"
  config:
    global:
      scrape_interval: 10s
      external_labels:
        env: "dev"
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi

loki:
  enabled: true
  deploymentMode: SingleBinary
  backend:
    replicas: 0
  read:
    replicas: 0
  write:
    replicas: 0
  loki:
    commonConfig:
      replication_factor: 1
      path_prefix: /tmp/loki
    compactor:
      working_directory: /tmp/loki/compactor
    storage_config:
      filesystem:
        chunks_directory: /tmp/loki/chunks
        rules_directory: /tmp/loki/rules
    storage:
      type: "filesystem"
    rulerConfig:
      storage:
        type: local
        local:
          directory: /tmp/loki/rules
    schemaConfig:
      configs:
        - from: "2025-01-01"
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: index_
            period: 24h
  singleBinary:
    replicas: 1
    persistence:
      enabled: false
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 300m
        memory: 512Mi
  chunksCache:
    enabled: false
  resultsCache:
    enabled: false

promtail:
  enabled: true
  config:
    clients:
      - url: "http://monitoring-loki:3100/loki/api/v1/push"
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi

grafana:
  enabled: true
  persistence:
    enabled: false
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 300m
      memory: 512Mi
  additionalDataSources:
    - name: "VictoriaMetrics"
      type: "prometheus"
      url: "http://monitoring-victoria-metrics-single-server:8428"
      isDefault: true
    - name: "Loki"
      type: "loki"
      url: "http://monitoring-loki:3100"

alertmanager:
  enabled: false

prometheus-node-exporter:
  enabled: true
  prometheus:
    monitor:
      enabled: false
  resources:
    requests:
      cpu: 50m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 64Mi
  tolerations:
    - key: node-role.kubernetes.io/control-plane
      operator: Exists
      effect: NoSchedule