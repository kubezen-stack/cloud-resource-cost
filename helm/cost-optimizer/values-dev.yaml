replicaCount: 1

image:
  repository: ""
  pullPolicy: Always
  tag: "1.0.0-dev"

autoscaling:
  enabled: false

imagePullSecrets:
  - name: ecr-secret

service:
  type: NodePort
  port: 80
  targetPort: 8000
  nodePort: 30080

ingress:
  enabled: false

resources:
  main:
    requests:
      cpu: 200m
      memory: 256Mi
      storage: 1Gi
    limits:
      cpu: 500m
      memory: 512Mi
  migration:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 300m
      memory: 256Mi
  tests:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi

app:
  name: cost-optimizer
  environment: dev
  debug: "true"
  version: "1.0.0"
  logLevel: DEBUG
  algorithm: "HS256"
  accessTokenExpireMinutes: 10080
  secretKey: ""

  corsOrigins:
    - "http://localhost:3000"
    - "http://localhost:8000"

database:
  host: cost-optimizer-postgresql
  port: 5432
  name: cost_optimizer_dev
  user: dbadmin
  password: ""

postgresql:
  enabled: true
  image:
    registry: "public.ecr.aws"
    repository: "bitnami/postgresql"
    tag: "latest"
  auth:
    username: dbadmin
    database: cost_optimizer_dev
    password: ""
  primary:
    persistence:
      enabled: false
      size: 5Gi
    resources:
      limits:
        cpu: 500m
        memory: 512Mi
      requests:
        cpu: 250m
        memory: 256Mi

livenessProbe:
  httpGet:
    path: /api/v1/health/health
    port: 8000
  initialDelaySeconds: 15
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /api/v1/health/ready
    port: 8000
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3