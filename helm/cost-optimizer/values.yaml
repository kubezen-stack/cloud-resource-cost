replicaCount: 1

image:
  repository: ""
  tag: "1.0.0"
imagePullSecrets: []

resources:
  main:
    requests:
      cpu: 200m
      memory: 256Mi
      storage: 1Gi
    limits:
      cpu: 500m
      memory: 512Mi
  migration:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 300m
      memory: 256Mi
  tests:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi

service:
  type: ClusterIP
  port: 80
  targetPort: 8000

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80

ingress:
  enabled: false
  className: nginx
  hosts:
    - host: cost-optimizer.local
      paths:
        - path: /
          pathType: Prefix

app:
  name: cost-optimizer
  environment: prod
  debug: false
  version: "1.0.0"
  logLevel: INFO
  secretKey: "change-me-in-production"
  algorithm: "HS256"
  accessTokenExpireMinutes: 10080
  corsOrigins:
    - "http://localhost:3000"

database:
  host: postgres-service
  port: 5432
  name: cost_optimizer
  user: dbadmin
  passwordSecretName: cost-optimizer-secrets
  passwordSecretKey: database-password

postgresql:
  enabled: true
  auth:
    username: dbadmin
    database: cost_optimizer
    existingSecret: cost-optimizer-secrets
    secretKeys:
      adminPasswordKey: postgres-password
      userPasswordKey: database-password

livenessProbe:
  httpGet:
    path: /health
    port: 8000
  initialDelaySeconds: 30
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /ready
    port: 8000
  initialDelaySeconds: 10
  periodSeconds: 5
