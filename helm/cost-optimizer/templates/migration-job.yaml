apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "cost-optimizer.fullname" . }}-migration
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cost-optimizer.labels" . | nindent 4 }}
    component: migration
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 2
  template:
    metadata:
      labels:
        {{- include "cost-optimizer.selectorLabels" . | nindent 8 }}
        component: migration
    spec:
      restartPolicy: Never
      containers:
        - name: alembic-migrate
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["alembic", "upgrade", "head"]
          envFrom:
            - configMapRef:
                name: {{ include "cost-optimizer.fullname" . }}-config
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "cost-optimizer.fullname" . }}-secrets
                  key: database-password
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "cost-optimizer.fullname" . }}-secrets
                  key: secret-key