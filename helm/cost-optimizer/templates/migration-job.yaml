apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "cost-optimizer.fullname" . }}-migration
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cost-optimizer.labels" . | nindent 4 }}
    component: migration
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 5
  template:
    metadata:
      labels:
        {{- include "cost-optimizer.selectorLabels" . | nindent 8 }}
        component: migration
    spec:
      restartPolicy: Never
      automountServiceAccountToken: false
      imagePullSecrets:
        {{- range .Values.imagePullSecrets }}
        - name: {{ .name }}
        {{- end }}
      initContainers:
        - name: wait-for-db
          image: busybox
          command: ['sh', '-c', 'until nc -z {{ .Values.database.host }} {{ .Values.database.port }}; do echo "waiting for postgresql..."; sleep 5; done']
      containers:
        - name: alembic-migrate
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          resources:
            requests:
              cpu: {{ .Values.resources.migration.requests.cpu }}
              memory: {{ .Values.resources.migration.requests.memory }}
            limits:
              cpu: {{ .Values.resources.migration.limits.cpu }}
              memory: {{ .Values.resources.migration.limits.memory }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["alembic", "upgrade", "head"]
          envFrom:
            - configMapRef:
                name: {{ include "cost-optimizer.fullname" . }}-config
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "cost-optimizer.fullname" . }}-secrets
                  key: database-password
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "cost-optimizer.fullname" . }}-secrets
                  key: secret-key