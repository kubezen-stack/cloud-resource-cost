apiVersion: v1
kind: Secret
metadata:
  name: {{ include "cost-optimizer.fullname" . }}-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cost-optimizer.labels" . | nindent 4 }}
type: Opaque
stringData:
  secret-key: {{ .Values.app.secretKey | quote }}
  database-password: {{ .Values.database.password | quote }}
  postgres-password: {{ .Values.database.password | quote }}
  database-url: "postgresql+asyncpg://{{ .Values.database.user }}:{{ .Values.database.password }}@{{ .Values.database.host }}:{{ .Values.database.port }}/{{ .Values.database.name }}"