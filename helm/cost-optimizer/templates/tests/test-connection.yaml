apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "cost-optimizer.fullname" . }}-test-connection"
  labels:
    {{- include "cost-optimizer.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  automountServiceAccountToken: false
  containers:
    - name: wget
      image: busybox:1.36
      resources:
        requests:
          cpu: {{ .Values.resources.tests.requests.cpu }}
          memory: {{ .Values.resources.tests.requests.memory }}
        limits:
          cpu: {{ .Values.resources.tests.limits.cpu }}
          memory: {{ .Values.resources.tests.limits.memory }}
      command: ['wget']
      args: ['{{ include "cost-optimizer.fullname" . }}:{{ .Values.service.port }}/health']
  restartPolicy: Never
